<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="marble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e0d4"/>
      <stop offset="30%" stop-color="#f5f0ea"/>
      <stop offset="50%" stop-color="#d9d0c4"/>
      <stop offset="70%" stop-color="#f0ebe4"/>
      <stop offset="100%" stop-color="#ddd5c8"/>
    </linearGradient>
    <linearGradient id="columnP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0ea"/>
      <stop offset="40%" stop-color="#e0d8cc"/>
      <stop offset="100%" stop-color="#c8bfb0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#050505"/>
  <!-- Left bracket -->
  <text x="68" y="370" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif" font-size="340" font-weight="300" fill="#FF6B00" opacity="0.9">[</text>
  <!-- P with marble column feel -->
  <text x="256" y="375" text-anchor="middle" font-family="'Playfair Display', 'Times New Roman', Georgia, serif" font-size="320" font-weight="700" fill="url(#columnP)" letter-spacing="-5">P</text>
  <!-- Right bracket -->
  <text x="340" y="370" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif" font-size="340" font-weight="300" fill="#FF6B00" opacity="0.9">]</text>
</svg>

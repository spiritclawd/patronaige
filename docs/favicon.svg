<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Marmol/ marble texture via noise -->
    <filter id="marmol" x="-50%" y="-50%" width="200%" height="200%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.01" numOctaves="3" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#e5e7eb" surfaceScale="2" result="diff">
        <feDistantLight azimuth="45" elevation="60"/>
      </feDiffuseLighting>
      <feComposite in="SourceGraphic" in2="diff" operator="in"/>
    </filter>

    <!-- Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#06b6d4" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Metallic gradient -->
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e5e7eb"/>
      <stop offset="30%" stop-color="#f3f4f6"/>
      <stop offset="70%" stop-color="#d1d5db"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background capsule -->
  <rect x="4" y="8" width="56" height="48" rx="14" ry="14" fill="url(#metal)" filter="url(#shadow)"/>

  <!-- Inner dark slot -->
  <rect x="10" y="14" width="44" height="36" rx="8" ry="8" fill="#0a0a0f"/>

  <!-- P monogram -->
  <g transform="translate(32, 36)" filter="url(#glow)">
    <path d="M-8 -6
             C-8 -10, -4 -12, 0 -12
             C4 -12, 8 -10, 8 -6
             L8 2
             L4 2
             L4 8
             L0 8
             L0 2
             L-4 2
             L-4 -6
             Z"
          fill="none"
          stroke="url(#metal)"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    <!-- inner stroke -->
    <path d="M-6 -4
             C-6 -7, -3 -9, 0 -9
             C3 -9, 6 -7, 6 -4
             L6 0
             L3 0
             L3 5
             L0 5
             L0 0
             L-3 0
             L-3 -4
             Z"
          fill="none"
          stroke="#06b6d4"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.8"/>
  </g>

  <!-- Subtle marmol veins -->
  <g opacity="0.15">
    <path d="M12 20 Q24 28 36 22 T60 24" stroke="#fff" stroke-width="0.5" fill="none"/>
    <path d="M10 30 Q22 38 34 32 T58 34" stroke="#818cf8" stroke-width="0.5" fill="none"/>
    <path d="M14 42 Q26 50 38 44 T62 46" stroke="#22d3ee" stroke-width="0.5" fill="none"/>
  </g>
</svg>
